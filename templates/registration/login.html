{% extends 'base.html' %}

{% block title %}Entrar | Hemepar Solidario{% endblock %}

{% block content %}
<section class="card auth-card">
    <h2>Acesso ao sistema</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>
    <p>Ainda nao possui conta? <a href="{% url 'cadastro' %}">Cadastre-se</a></p>
</section>
{% endblock %}
