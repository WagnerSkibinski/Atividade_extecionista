{% extends 'base.html' %}

{% block title %}Cadastro de Brinde | Hemepar Solidario{% endblock %}

{% block content %}
<section class="card form-card">
    <h2>Adicionar brinde para {{ empresa.nome }}</h2>
    <p>Agora informe o beneficio que sera exibido para os doadores.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ brinde_form.as_p }}
        <button type="submit">Anunciar brinde</button>
    </form>
</section>
{% endblock %}
